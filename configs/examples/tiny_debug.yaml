# Tiny GPU smoke-test config. This is not a paper-scale experiment.
run_name: tiny_debug_adamw
paper_experiment: tiny_debug
model_scale: tiny
width_multiplier: 2
optimizer_name: adamw
optimizer_variant: adamw
num_gpus_used: 1

data_dir: data/tiny_debug
model_dim: 128
n_layer: 2
n_head: 4
ffn_mult: 2
sequence_length: 64
postln_frac: 0.0
batch_size: 8
device_batch_size: 2
num_iterations: 10
seed: 1337
warmup_ratio: 0.0
warmdown_ratio: 0.2
val_loss_every: 5
val_tokens: 1024
checkpoint_freq: 0
checkpoint_dir: null

enable_eigen_metrics: true
eigen_metrics_dir: outputs/eigen_metrics/tiny_debug
eigen_log_steps: 5
track_by_frequency: false
token_freq_file: null

wandb_project_name: optimizer-spectral-scaling-laws
wandb_job_name: null
no_wandb: true

dp_size: null
fs_size: null
tp_size: null
debug: false
no_compile: true
no_triton: true

optimizer: adamw
scalar_opt: adamw
lr: 0.003
mu: 0.95
weight_decay: 0.01
spectral_error_policy: warn

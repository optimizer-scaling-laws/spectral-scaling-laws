name: cpu-checks

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install CPU-safe test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile Python files
        run: python -m compileall -q optimizer_ssl scripts tests
      - name: Run tests
        run: python -m pytest -q
      - name: Check shell syntax
        run: bash -n scripts/train/*.sh scripts/preprocess/*.sh
      - name: Run CPU spectral diagnostic example
        run: python examples/probe_synthetic_activations.py
